<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap 5 Grid</title>
    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

    <!-- Exercise 7: Cards Columns -->
    <div class="container mt-4 p-4">
      <h4 class="fw-bold">Cards Columns</h4>
      <div class="row">
        <div class="col-md-4">
          <div class="card border-primary border-3">
            <img src="images/Car.png" class="card-img-top" alt="Car" />
            <div class="card-body bg-primary">
              <p class="card-text text-white">Some text inside the first card</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card border-warning border-3">
            <img src="images/Car.png" class="card-img-top" alt="Car" />
            <div class="card-body bg-warning">
              <p class="card-text text-white">Some text inside the second card</p>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card border-danger border-3">
            <img src="images/Car.png" class="card-img-top" alt="Car" />
            <div class="card-body bg-danger">
              <p class="card-text text-white">Some text inside the third card</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- jQuery -->
    <script src="node_modules/jquery/dist/jquery.slim.min.js"></script>
    <!-- Popper.js -->
    <script src="node_modules/@popperjs/core/dist/umd/popper.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.min.js"></script>
  </body>
</html>
